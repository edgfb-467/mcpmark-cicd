name: Deployment Status

on:
  push:
    branches:
      - main

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  pre-deployment:
    runs-on: ubuntu-latest
    outputs:
      issue_number: ${{ steps.create-issue.outputs.result }}
      prev_sha: ${{ steps.get-info.outputs.prev_sha }}
      package_version: ${{ steps.get-info.outputs.package_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

      - name: Run Tests
        run: npm run test

      - name: Get Info
        id: get-info
        run: |
          PREV_SHA=$(git rev-parse HEAD^)
          echo "prev_sha=$PREV_SHA" >> $GITHUB_OUTPUT
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "package_version=$PKG_VERSION" >> $GITHUB_OUTPUT

      - name: Create Deployment Tracking Issue
        id: create-issue
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha;
            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Deployment Tracking - ${sha}`,
              body: `Deployment started for commit ${sha}\n\nRunning pre-deployment checks...`,
              labels: ['deployment', 'in-progress']
            });
            return issue.number;

      - name: Post Pre-deployment Comment
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = ${{ steps.create-issue.outputs.result }};
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              body: "Pre-deployment checks completed"
            });

  rollback-preparation:
    needs: pre-deployment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Rollback Artifacts
        id: create-artifacts
        run: |
          mkdir rollback-artifacts
          
          # 1. Executable rollback script
          cat << 'EOF' > rollback-artifacts/rollback.sh
          #!/bin/bash
          set -e
          echo "Starting rollback process..."
          if [ -f "package-lock.json" ]; then
            echo "Restoring dependencies..."
            npm ci
          else
            echo "Error: package-lock.json not found!"
            exit 1
          fi
          echo "Rollback completed successfully."
          EOF
          chmod +x rollback-artifacts/rollback.sh
          
          # 2. Configuration backups
          cp package.json rollback-artifacts/
          cp package-lock.json rollback-artifacts/
          
          # 3. Dependency verification script
          cat << 'EOF' > rollback-artifacts/verify.js
          const fs = require('fs');
          console.log('Verifying dependencies...');
          if (fs.existsSync('./package.json')) {
            console.log('package.json exists');
          } else {
            console.error('package.json missing');
            process.exit(1);
          }
          console.log('Verification passed.');
          EOF
          
          # 4. Detailed rollback documentation
          echo "# Rollback Instructions" > rollback-artifacts/rollback.md
          echo "1. Run ./rollback.sh" >> rollback-artifacts/rollback.md
          echo "2. Verify with node verify.js" >> rollback-artifacts/rollback.md
          
          # 5. Compress
          tar -czf rollback-package-${{ github.sha }}.tar.gz -C rollback-artifacts .
          
          # Checksum
          CHECKSUM=$(sha256sum rollback-package-${{ github.sha }}.tar.gz | awk '{print $1}')
          echo "checksum=$CHECKSUM" >> $GITHUB_OUTPUT
          echo "artifact_name=rollback-package-${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Upload Rollback Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.create-artifacts.outputs.artifact_name }}
          path: rollback-package-${{ github.sha }}.tar.gz
          retention-days: 30

      - name: Post Rollback Plan Comment
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = ${{ needs.pre-deployment.outputs.issue_number }};
            const prev_sha = "${{ needs.pre-deployment.outputs.prev_sha }}";
            const current_sha = "${{ github.sha }}";
            const version = "${{ needs.pre-deployment.outputs.package_version }}";
            const artifact_name = "${{ steps.create-artifacts.outputs.artifact_name }}";
            const checksum = "${{ steps.create-artifacts.outputs.checksum }}";
            
            const body = `## 🔄 Rollback Plan Ready
            
            - Previous Commit: ${prev_sha}
            - Current Commit: ${current_sha}
            - Package Version: ${version}
            - Artifact: ${artifact_name}
            
            ### Checklist
            - [x] Executable rollback script created
            - [x] Configuration backups (package.json, package-lock.json)
            - [x] Dependency verification script
            - [x] Detailed rollback documentation
            - [x] Compressed rollback package
            
            ### Quick Rollback Command
            \`\`\`bash
            ./rollback.sh
            \`\`\`
            
            ### Verification
            - Rollback script created: true
            - Configuration backup: true
            - Artifact checksum: SHA256: ${checksum}
            `;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              body: body
            });

  post-deployment:
    needs: [pre-deployment, rollback-preparation]
    runs-on: ubuntu-latest
    steps:
      - name: Update Issue Labels
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = ${{ needs.pre-deployment.outputs.issue_number }};
            
            // Remove in-progress
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              name: 'in-progress'
            });
            
            // Add completed
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              labels: ['completed']
            });

      - name: Post Completion Comment
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = ${{ needs.pre-deployment.outputs.issue_number }};
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              body: "Deployment Completed Successfully. Rollback artifacts have been uploaded."
            });

      - name: Close Issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = ${{ needs.pre-deployment.outputs.issue_number }};
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              state: 'closed'
            });
